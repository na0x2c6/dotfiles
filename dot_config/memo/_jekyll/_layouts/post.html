---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <div class="meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%Y-%m-%d" }}
    </time>
    {% if page.categories.size > 0 %}
      <span class="categories">
        {% for cat in page.categories %}
          <span class="category">{{ cat }}</span>{% unless forloop.last %} {% endunless %}
        {% endfor %}
      </span>
    {% endif %}
  </div>
  {{ content }}
</article>
